<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(
                135deg,
                #020617 0%,
                #0f172a 25%,
                #1e3a8a 50%,
                #0f172a 75%,
                #020617 100%
            );
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #2B3445;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            width: 350px;
            text-align: center;
            color: #ffffff;
        }
        h2 {
            color: #ffffff;
            margin-top: 0;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background: #3a4558;
            border: 1px solid #4a5568;
            border-radius: 5px;
            color: #ffffff;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        select option {
            background: #2B3445;
            color: #ffffff;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
            cursor: pointer;
            background: #1e3a8a;
            border: none;
            border-radius: 5px;
            color: #ffffff;
        }
        button:hover {
            background: #2a4fa8;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.8;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Temperature Converter</h2>
    <input type="number" id="temp" placeholder="Enter Temperature">
    <select id="unit">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
        <option value="K">Kelvin (K)</option>
    </select>
    <button onclick="convertTemperature()">Convert</button>
    <div id="result"></div>
</div>
<script>
function convertTemperature() {
    let temp = parseFloat(document.getElementById("temp").value);
    let unit = document.getElementById("unit").value;
    let result = "";

    if (isNaN(temp)) {
        document.getElementById("result").innerHTML =
            "Please enter a valid temperature.";
        return;
    }

    if (unit === "C") {
        let f = (temp * 9/5) + 32;
        let k = temp + 273.15;
        result = `Fahrenheit: ${f.toFixed(2)} °F <br> Kelvin: ${k.toFixed(2)} K`;
    } else if (unit === "F") {
        let c = (temp - 32) * 5/9;
        let k = c + 273.15;
        result = `Celsius: ${c.toFixed(2)} °C <br> Kelvin: ${k.toFixed(2)} K`;
    } else if (unit === "K") {
        let c = temp - 273.15;
        let f = (c * 9/5) + 32;
        result = `Celsius: ${c.toFixed(2)} °C <br> Fahrenheit: ${f.toFixed(2)} °F`;
    }

    document.getElementById("result").innerHTML = result;
}
</script>
</body>
</html>
